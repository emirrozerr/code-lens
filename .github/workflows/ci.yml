name: CodeLens CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/codelens_dev
          NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
        ports:
          - 7687:7687
          - 7474:7474
        # Wait until neo4j is healthy before proceeding
        options: >-
          --health-cmd "cypher-shell -u neo4j -p codelens_dev 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Tests with Coverage
        run: |
          pytest tests/ --cov=codelens --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
