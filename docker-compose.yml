services:
  neo4j:
    image: neo4j:5-community
    container_name: codelens-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"    # Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"    # Bolt protocol (driver)
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-codelens_dev}"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mcp-server:
    build: .
    container_name: codelens-mcp
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-codelens_dev}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      # Mount the host directory to /app so the indexer has access to host files
      # if we want to run 'codelens index' from within the container
      - .:/app

volumes:
  neo4j_data:
  neo4j_logs:
